server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/debtsbot}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:debtsbot}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:debtsbot}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1

spring.liquibase.enabled=true

spring.data.jdbc.repositories.enabled=true

spring.neo4j.uri=${SPRING_NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
spring.neo4j.authentication.password=${SPRING_NEO4J_AUTHENTICATION_PASSWORD:debtsbot123}

bot.token=${BOT_TOKEN:PASTE_YOUR_TOKEN}
bot.name=${BOT_NAME:DebtsAppBot}
telegram.bot.enabled=${TELEGRAM_BOT_ENABLED:false}

sessionToken.lifetime=${SESSION_TOKEN_LIFETIME:1m}
jwt.lifetime=${JWT_LIFETIME:10m}
linkToken.lifetime=${LINK_TOKEN_LIFETIME:5m}
jwt.secret=${JWT_SECRET:}
app.jwt.allow-generated-secret=${APP_JWT_ALLOW_GENERATED_SECRET:true}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
