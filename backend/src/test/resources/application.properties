# Test configuration - values will be overridden by @DynamicPropertySource
spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# Liquibase will use the testcontainer datasource
spring.liquibase.enabled=true

spring.data.jdbc.repositories.enabled=true

# Neo4j - will be overridden by Testcontainers
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=

# Disable Telegram bot in tests
telegram.bot.enabled=false

# Test bot configuration (not needed for tests, but prevents startup errors)
bot.token=test-token
bot.name=TestBot

sessionToken.lifetime=1m
jwt.lifetime=10m
linkToken.lifetime=5m
