---
- name: Deploy DebtsApp
  hosts: debtsapp
  gather_facts: false
  vars:
    deploy_dir: /home/robot/debtsapp
  tasks:
    - name: Ensure deploy directory exists
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: "0755"

    - name: Upload production compose file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../deploy/docker-compose.prod.yml"
        dest: "{{ deploy_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Upload frontend nginx config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../deploy/frontend.nginx.ssl.conf"
        dest: "{{ deploy_dir }}/frontend.nginx.ssl.conf"
        mode: "0644"

    - name: Log in to GHCR
      ansible.builtin.shell: |
        set -eu
        printf '%s' '{{ ghcr_token }}' | docker login ghcr.io -u '{{ ghcr_username }}' --password-stdin
      args:
        executable: /bin/bash
      no_log: true

    - name: Pull container images
      ansible.builtin.command: docker compose pull
      args:
        chdir: "{{ deploy_dir }}"

    - name: Start application stack
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ deploy_dir }}"
