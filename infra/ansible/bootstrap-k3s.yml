---
- name: Bootstrap k3s on the new VM
  hosts: debtsapp
  become: true
  gather_facts: false
  vars:
    swap_file_path: /swapfile
    swap_file_size_mb: 4096
    # На Ubuntu 24.04 flannel требует загруженных модулей ядра и включенного forwarding.
    kernel_modules:
      - br_netfilter
      - overlay
    required_sysctls:
      - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
      - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
      - { key: net.ipv4.ip_forward,                 value: "1" }
      - { key: vm.swappiness,                       value: "10" }

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - iptables
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Load kernel modules required by k3s/flannel
      ansible.builtin.shell: |
        set -e
        modprobe {{ item }}
        echo "{{ item }}" > /etc/modules-load.d/{{ item }}.conf
      args:
        executable: /bin/bash
      loop: "{{ kernel_modules }}"
      changed_when: false

    - name: Apply sysctls required by k3s/flannel
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop: "{{ required_sysctls }}"

    - name: Ensure swap file is enabled
      ansible.builtin.shell: |
        set -euo pipefail
        if swapon --show=NAME --noheadings | grep -qx "{{ swap_file_path }}"; then
          exit 0
        fi
        if [ ! -f "{{ swap_file_path }}" ]; then
          fallocate -l {{ swap_file_size_mb }}M "{{ swap_file_path }}"
          chmod 600 "{{ swap_file_path }}"
          mkswap "{{ swap_file_path }}"
        fi
        swapon "{{ swap_file_path }}"
        grep -q "^{{ swap_file_path }} " /etc/fstab || echo "{{ swap_file_path }} none swap sw 0 0" >> /etc/fstab
      args:
        executable: /bin/bash
      changed_when: false

    - name: Install k3s
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_CHANNEL="{{ k3s_install_channel }}" \
          INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --tls-san {{ app_domain }} --kubelet-arg fail-swap-on=false" \
          sh -
      args:
        executable: /bin/bash
        creates: /usr/local/bin/k3s

    - name: Ensure k3s service is enabled
      ansible.builtin.systemd:
        name: k3s
        enabled: true
        state: started

    - name: Wait for kubeconfig
      ansible.builtin.wait_for:
        path: "{{ k3s_kubeconfig }}"
        timeout: 180

    - name: Ensure kubectl symlink exists
      ansible.builtin.file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link

    - name: Install Helm
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        executable: /bin/bash
        creates: /usr/local/bin/helm

    - name: Wait for Kubernetes node readiness
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        kubectl wait --for=condition=Ready node --all --timeout=600s
      args:
        executable: /bin/bash
      register: node_ready
      failed_when: false
      changed_when: false

    - name: Collect diagnostics on node failure
      when: node_ready.rc is defined and node_ready.rc != 0
      ansible.builtin.shell: |
        set +e
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        echo "=== kubectl get nodes -o wide ==="
        kubectl get nodes -o wide
        echo
        echo "=== kubectl describe node ==="
        kubectl describe node
        echo
        echo "=== kubectl -n kube-system get pods -o wide ==="
        kubectl -n kube-system get pods -o wide
        echo
        echo "=== kubectl -n kube-system describe pods ==="
        kubectl -n kube-system describe pods
        echo
        echo "=== /etc/cni/net.d ==="
        ls -la /etc/cni/net.d 2>/dev/null || echo "(missing)"
        cat /etc/cni/net.d/* 2>/dev/null || true
        echo
        echo "=== systemctl status k3s (no pager) ==="
        systemctl status k3s --no-pager || true
        echo
        echo "=== journalctl -u k3s --no-pager -n 400 ==="
        journalctl -u k3s --no-pager -n 400
      args:
        executable: /bin/bash
      register: node_diagnostics
      changed_when: false

    - name: Print diagnostics
      when: node_ready.rc is defined and node_ready.rc != 0
      ansible.builtin.debug:
        var: node_diagnostics.stdout_lines

    - name: Fail if node is not ready
      when: node_ready.rc is defined and node_ready.rc != 0
      ansible.builtin.fail:
        msg: "k3s node did not become Ready within 600s; see diagnostics above"
