---
- name: Bootstrap k3s on the new VM
  hosts: debtsapp
  become: true
  gather_facts: false
  vars:
    swap_file_path: /swapfile
    swap_file_size_mb: 4096

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - iptables
        state: present
        update_cache: true
        cache_valid_time: 3600

    # На Ubuntu 24.04 nftables-бэкенд iptables иногда ломает kube-proxy/flannel.
    - name: Force legacy iptables backend
      ansible.builtin.shell: |
        set -e
        update-alternatives --set iptables /usr/sbin/iptables-legacy || true
        update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure swap file exists
      ansible.builtin.shell: |
        set -euo pipefail
        if swapon --show=NAME --noheadings | grep -qx "{{ swap_file_path }}"; then
          exit 0
        fi
        if [ ! -f "{{ swap_file_path }}" ]; then
          fallocate -l {{ swap_file_size_mb }}M "{{ swap_file_path }}"
          chmod 600 "{{ swap_file_path }}"
          mkswap "{{ swap_file_path }}"
        fi
        swapon "{{ swap_file_path }}"
      args:
        executable: /bin/bash
      register: swap_setup
      changed_when: swap_setup.stdout != ""

    - name: Persist swap file in fstab
      ansible.posix.mount:
        name: none
        src: "{{ swap_file_path }}"
        fstype: swap
        opts: sw
        state: present

    - name: Set low swappiness
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "10"
        state: present

    - name: Install k3s
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_CHANNEL="{{ k3s_install_channel }}" \
          INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --tls-san {{ app_domain }} --kubelet-arg fail-swap-on=false" \
          sh -
      args:
        executable: /bin/bash
        creates: /usr/local/bin/k3s

    - name: Ensure k3s service is enabled
      ansible.builtin.systemd:
        name: k3s
        enabled: true
        state: started

    - name: Wait for kubeconfig
      ansible.builtin.wait_for:
        path: "{{ k3s_kubeconfig }}"
        timeout: 180

    - name: Ensure kubectl symlink exists
      ansible.builtin.file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link

    - name: Install Helm
      ansible.builtin.shell: |
        set -euo pipefail
        curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        executable: /bin/bash
        creates: /usr/local/bin/helm

    - name: Wait for Kubernetes node readiness
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        kubectl wait --for=condition=Ready node --all --timeout=600s
      args:
        executable: /bin/bash
      register: node_ready
      failed_when: false
      changed_when: false

    - name: Diagnose node failure
      when: node_ready.rc is defined and node_ready.rc != 0
      ansible.builtin.shell: |
        set +e
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        echo "=== kubectl get nodes -o wide ==="
        kubectl get nodes -o wide
        echo "=== kubectl describe node ==="
        kubectl describe node
        echo "=== kubectl -n kube-system get pods ==="
        kubectl -n kube-system get pods
        echo "=== journalctl -u k3s --no-pager -n 200 ==="
        journalctl -u k3s --no-pager -n 200
      args:
        executable: /bin/bash

    - name: Fail if node is not ready
      when: node_ready.rc is defined and node_ready.rc != 0
      ansible.builtin.fail:
        msg: "k3s node did not become Ready within 600s; see diagnostics above"
