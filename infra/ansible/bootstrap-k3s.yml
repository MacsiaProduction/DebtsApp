---
- name: Bootstrap k3s on the new VM
  hosts: debtsapp
  become: true
  gather_facts: true
  vars:
    swap_file_path: /swapfile
    swap_file_size_mb: 4096

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - python3
          - python3-pip
          - unzip
          - apt-transport-https
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Check whether swap is already enabled
      ansible.builtin.command: swapon --show=NAME --noheadings
      register: swap_devices
      changed_when: false

    - name: Allocate swap file
      ansible.builtin.command: fallocate -l {{ swap_file_size_mb }}M {{ swap_file_path }}
      args:
        creates: "{{ swap_file_path }}"
      when: swap_file_path not in swap_devices.stdout

    - name: Set swap file permissions
      ansible.builtin.file:
        path: "{{ swap_file_path }}"
        owner: root
        group: root
        mode: "0600"

    - name: Format swap file
      ansible.builtin.command: mkswap {{ swap_file_path }}
      when: swap_file_path not in swap_devices.stdout

    - name: Enable swap file
      ansible.builtin.command: swapon {{ swap_file_path }}
      when: swap_file_path not in swap_devices.stdout

    - name: Persist swap file in fstab
      ansible.builtin.mount:
        name: none
        src: "{{ swap_file_path }}"
        fstype: swap
        opts: sw
        state: present

    - name: Set low swappiness
      ansible.posix.sysctl:
        name: vm.swappiness
        value: "10"
        state: present

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install Docker apt key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Download k3s installer
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/get-k3s.sh
        mode: "0755"

    - name: Install k3s
      ansible.builtin.shell: |
        set -euo pipefail
        INSTALL_K3S_CHANNEL="{{ k3s_install_channel }}" \
        INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644 --tls-san {{ app_domain }} --kubelet-arg fail-swap-on=false" \
        /tmp/get-k3s.sh
      args:
        executable: /bin/bash
        creates: /usr/local/bin/k3s

    - name: Ensure k3s service is enabled
      ansible.builtin.systemd:
        name: k3s
        enabled: true
        state: started

    - name: Wait for kubeconfig
      ansible.builtin.wait_for:
        path: "{{ k3s_kubeconfig }}"
        timeout: 180

    - name: Ensure kubectl symlink exists
      ansible.builtin.file:
        src: /usr/local/bin/k3s
        dest: /usr/local/bin/kubectl
        state: link

    - name: Download Helm installer
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm-3.sh
        mode: "0755"

    - name: Install Helm
      ansible.builtin.shell: |
        set -euo pipefail
        /tmp/get-helm-3.sh
      args:
        executable: /bin/bash
        creates: /usr/local/bin/helm

    - name: Wait for Kubernetes node readiness
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        kubectl wait --for=condition=Ready node --all --timeout=180s
      args:
        executable: /bin/bash
