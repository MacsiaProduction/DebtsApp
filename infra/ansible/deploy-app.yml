---
- name: Deploy DebtsApp to k3s
  hosts: debtsapp
  become: true
  gather_facts: false
  vars_files:
    - vars/deploy-secrets.yml
  vars:
    app_manifest_templates:
      - 10-namespace.yaml.j2
      - 20-secrets-config.yaml.j2
      - 30-postgres.yaml.j2
      - 40-neo4j.yaml.j2
      - 50-backend.yaml.j2
      - 60-frontend.yaml.j2
      - 70-ingress.yaml.j2
      - 80-hpa.yaml.j2
      - 90-monitoring.yaml.j2
    helm_repos:
      - { name: jetstack,             url: "https://charts.jetstack.io" }
      - { name: metrics-server,       url: "https://kubernetes-sigs.github.io/metrics-server/" }
      - { name: prometheus-community, url: "https://prometheus-community.github.io/helm-charts" }
    rollout_waits:
      - { kind: deployment,  name: cert-manager,            ns: cert-manager }
      - { kind: deployment,  name: cert-manager-webhook,    ns: cert-manager }
      - { kind: deployment,  name: cert-manager-cainjector, ns: cert-manager }
      - { kind: deployment,  name: metrics-server,          ns: kube-system }
      - { kind: statefulset, name: debts-bot-db,            ns: "{{ app_namespace }}" }
      - { kind: statefulset, name: debts-neo4j,             ns: "{{ app_namespace }}" }
      - { kind: deployment,  name: debts-bot,               ns: "{{ app_namespace }}" }
      - { kind: deployment,  name: debts-frontend,          ns: "{{ app_namespace }}" }
      - { kind: deployment,  name: "{{ monitoring_release_name }}-kube-prometheus-operator", ns: "{{ monitoring_namespace }}" }
      - { kind: deployment,  name: "{{ monitoring_release_name }}-grafana",                  ns: "{{ monitoring_namespace }}" }
  environment:
    KUBECONFIG: "{{ k3s_kubeconfig }}"

  tasks:
    - name: Ensure manifest directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ manifest_dir }}"
        - "{{ manifest_dir }}/app"

    - name: Add Helm repositories
      ansible.builtin.command: helm repo add {{ item.name }} {{ item.url }}
      loop: "{{ helm_repos }}"
      register: helm_repo_add
      changed_when: "'has been added' in helm_repo_add.stdout"
      failed_when:
        - helm_repo_add.rc != 0
        - "'already exists' not in helm_repo_add.stderr"

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install cert-manager
      ansible.builtin.command: >-
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace cert-manager --create-namespace --set crds.enabled=true

    - name: Install metrics-server
      ansible.builtin.command:
        argv:
          - helm
          - upgrade
          - --install
          - metrics-server
          - metrics-server/metrics-server
          - --namespace
          - kube-system
          - --set
          - args[0]=--kubelet-insecure-tls
          - --set
          - args[1]=--kubelet-preferred-address-types=InternalIP\,ExternalIP\,Hostname

    - name: Render ClusterIssuer manifest
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/cluster-issuer.yaml.j2"
        dest: "{{ manifest_dir }}/app/00-cluster-issuer.yaml"
        mode: "0644"

    - name: Render monitoring values
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/monitoring-values.yaml.j2"
        dest: "{{ manifest_dir }}/monitoring-values.yaml"
        mode: "0600"

    - name: Render application manifests
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/{{ item }}"
        dest: "{{ manifest_dir }}/app/{{ item | regex_replace('\\.j2$', '') }}"
        mode: "0644"
      loop: "{{ app_manifest_templates }}"

    - name: Apply ClusterIssuer manifest
      ansible.builtin.command: kubectl apply -f {{ manifest_dir }}/app/00-cluster-issuer.yaml

    - name: Install kube-prometheus-stack
      ansible.builtin.command: >-
        helm upgrade --install {{ monitoring_release_name }} prometheus-community/kube-prometheus-stack
        --namespace {{ monitoring_namespace }} --create-namespace
        --values {{ manifest_dir }}/monitoring-values.yaml
      register: monitoring_install
      retries: 3
      delay: 20
      until: monitoring_install.rc == 0

    # kubectl apply -f dir обрабатывает все манифесты директории разом.
    - name: Apply application manifests
      ansible.builtin.command: kubectl apply -f {{ manifest_dir }}/app/

    - name: Wait for workloads to roll out
      ansible.builtin.command: >-
        kubectl rollout status {{ item.kind }}/{{ item.name }}
        -n {{ item.ns }} --timeout=300s
      loop: "{{ rollout_waits }}"
      changed_when: false
