---
- name: Deploy DebtsApp to k3s
  hosts: debtsapp
  become: true
  gather_facts: false
  vars_files:
    - vars/deploy-secrets.yml
  vars:
    app_manifest_templates:
      - 10-namespace.yaml.j2
      - 20-secrets-config.yaml.j2
      - 30-postgres.yaml.j2
      - 40-neo4j.yaml.j2
      - 50-backend.yaml.j2
      - 60-frontend.yaml.j2
      - 70-ingress.yaml.j2
      - 80-hpa.yaml.j2
      - 90-monitoring.yaml.j2

  tasks:
    - name: Ensure manifest directory exists
      ansible.builtin.file:
        path: "{{ manifest_dir }}"
        state: directory
        mode: "0755"

    - name: Add required Helm repositories
      ansible.builtin.shell: |
        set -euo pipefail
        if ! helm repo list | awk '{print $1}' | grep -qx jetstack; then
          helm repo add jetstack https://charts.jetstack.io
        fi
        if ! helm repo list | awk '{print $1}' | grep -qx metrics-server; then
          helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
        fi
        if ! helm repo list | awk '{print $1}' | grep -qx prometheus-community; then
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        fi
      args:
        executable: /bin/bash

    - name: Update Helm repositories
      ansible.builtin.command: helm repo update

    - name: Install cert-manager
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager \
          --create-namespace \
          --set crds.enabled=true
      args:
        executable: /bin/bash

    - name: Wait for cert-manager deployments
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        kubectl rollout status deploy/cert-manager -n cert-manager --timeout=300s
        kubectl rollout status deploy/cert-manager-webhook -n cert-manager --timeout=300s
        kubectl rollout status deploy/cert-manager-cainjector -n cert-manager --timeout=300s
      args:
        executable: /bin/bash

    - name: Ensure metrics-server is available
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        if ! kubectl get deployment metrics-server -n kube-system >/dev/null 2>&1; then
          helm upgrade --install metrics-server metrics-server/metrics-server \
            --namespace kube-system \
            --set args[0]=--kubelet-insecure-tls \
            --set args[1]=--kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
        fi
      args:
        executable: /bin/bash

    - name: Wait for metrics-server deployment
      ansible.builtin.command: kubectl rollout status deployment/metrics-server -n kube-system --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Render ClusterIssuer manifest
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/cluster-issuer.yaml.j2"
        dest: "{{ manifest_dir }}/00-cluster-issuer.yaml"
        mode: "0644"

    - name: Render monitoring values
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/monitoring-values.yaml.j2"
        dest: "{{ manifest_dir }}/monitoring-values.yaml"
        mode: "0600"

    - name: Render application manifests
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../k8s/{{ item }}"
        dest: "{{ manifest_dir }}/{{ item | regex_replace('\\.j2$', '') }}"
        mode: "0644"
      loop: "{{ app_manifest_templates }}"

    - name: Apply ClusterIssuer manifest
      ansible.builtin.command: kubectl apply -f {{ manifest_dir }}/00-cluster-issuer.yaml
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Install kube-prometheus-stack
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        helm upgrade --install {{ monitoring_release_name }} prometheus-community/kube-prometheus-stack \
          --namespace {{ monitoring_namespace }} \
          --create-namespace \
          --values {{ manifest_dir }}/monitoring-values.yaml
      args:
        executable: /bin/bash

    - name: Apply application manifests
      ansible.builtin.shell: |
        set -euo pipefail
        export KUBECONFIG="{{ k3s_kubeconfig }}"
        for manifest in {{ app_manifest_templates | map('regex_replace', '\.j2$', '') | join(' ') }}; do
          kubectl apply -f "{{ manifest_dir }}/${manifest}"
        done
      args:
        executable: /bin/bash

    - name: Wait for PostgreSQL rollout
      ansible.builtin.command: kubectl rollout status statefulset/debts-bot-db -n {{ app_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for Neo4j rollout
      ansible.builtin.command: kubectl rollout status statefulset/debts-neo4j -n {{ app_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for backend rollout
      ansible.builtin.command: kubectl rollout status deployment/debts-bot -n {{ app_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for frontend rollout
      ansible.builtin.command: kubectl rollout status deployment/debts-frontend -n {{ app_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for Prometheus operator rollout
      ansible.builtin.command: kubectl rollout status deployment/{{ monitoring_release_name }}-kube-prometheus-operator -n {{ monitoring_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"

    - name: Wait for Grafana rollout
      ansible.builtin.command: kubectl rollout status deployment/{{ monitoring_release_name }}-grafana -n {{ monitoring_namespace }} --timeout=300s
      environment:
        KUBECONFIG: "{{ k3s_kubeconfig }}"
