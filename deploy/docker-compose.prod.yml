services:
  debts_bot_db:
    image: postgres:15-alpine
    container_name: debts_bot_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=debtsbot
      - POSTGRES_PASSWORD=debtsbot
      - POSTGRES_DB=debtsbot
    volumes:
      - debts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U debtsbot -d debtsbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  debts_neo4j:
    image: neo4j:5-community
    container_name: debts_neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/debtsbot123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p debtsbot123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  debts_bot:
    image: ghcr.io/macsiaproduction/debtsapp-backend:latest
    container_name: debts_bot
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://debts_bot_db:5432/debtsbot
      - SPRING_DATASOURCE_USERNAME=debtsbot
      - SPRING_DATASOURCE_PASSWORD=debtsbot
      - SPRING_NEO4J_URI=bolt://debts_neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=debtsbot123
      - TELEGRAM_BOT_ENABLED=false
    depends_on:
      debts_bot_db:
        condition: service_healthy
      debts_neo4j:
        condition: service_healthy

  debts_frontend:
    image: ghcr.io/macsiaproduction/debtsapp-frontend:latest
    container_name: debts_frontend
    restart: unless-stopped
    depends_on:
      - debts_bot
    ports:
      - '127.0.0.1:3000:80'

volumes:
  debts_data:
    external: false
  neo4j_data:
    external: false
