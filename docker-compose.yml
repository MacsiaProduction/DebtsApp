services:
  caddy:
    image: caddy:2-alpine
    container_name: debts_caddy
    restart: always
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-debtsapp2.macsia.fun}
      ACME_EMAIL: ${ACME_EMAIL:-macsia.production@gmail.com}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - debts_frontend

  debts_bot_db:
    image: postgres:15-alpine
    container_name: debts_bot_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-debtsbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-debtsbot}
      POSTGRES_DB: ${POSTGRES_DB:-debtsbot}
    ports:
      - '5432:5432'
    volumes:
      - debts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-debtsbot} -d ${POSTGRES_DB:-debtsbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - debts-bot-db

  debts_neo4j:
    image: neo4j:5-community
    container_name: debts_neo4j
    restart: always
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/debtsbot123}
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-debtsbot123} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      default:
        aliases:
          - debts-neo4j

  debts_bot:
    container_name: debts_bot
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - '8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://debts-bot-db:5432/${POSTGRES_DB:-debtsbot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-debtsbot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-debtsbot}
      SPRING_NEO4J_URI: bolt://debts-neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:-debtsbot123}
      JWT_SECRET: ${JWT_SECRET:-debtsapp-local-dev-jwt-secret-change-me}
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      BOT_TOKEN: ${BOT_TOKEN:-}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-https://${APP_DOMAIN:-debtsapp2.macsia.fun},http://localhost:*,http://127.0.0.1:*}
    depends_on:
      debts_bot_db:
        condition: service_healthy
      debts_neo4j:
        condition: service_healthy
    networks:
      default:
        aliases:
          - debts-bot

  debts_frontend:
    container_name: debts_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE: ${REACT_APP_API_BASE:-/api}
    expose:
      - '80'
    depends_on:
      - debts_bot

volumes:
  caddy_data:
    external: false
  caddy_config:
    external: false
  debts_data:
    external: false
  neo4j_data:
    external: false
