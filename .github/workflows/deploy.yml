name: Provision And Deploy

on:
  workflow_dispatch:
    inputs:
      app_domain:
        description: Public DNS name for DebtsApp
        required: false
        default: debtsapp.macsia.fun
        type: string
      acme_email:
        description: Email for Let's Encrypt
        required: false
        default: macsia.production@gmail.com
        type: string
      vm_name:
        description: Name of the new Yandex VM
        required: false
        default: debtsapp-k3s
        type: string
      zone:
        description: Yandex Cloud zone
        required: false
        default: ru-central1-a
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_CLI_CONFIG_FILE: ${{ github.workspace }}/infra/terraform/terraformrc
      TF_DIR: infra/terraform/yandex
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      VM_NAME: ${{ inputs.vm_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: python -m pip install --upgrade pip ansible

      - name: Prepare SSH access
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/debtsapp_vm
          chmod 600 ~/.ssh/debtsapp_vm

      - name: Write Terraform variables
        env:
          CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          SSH_PUBLIC_KEY: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
          ADMIN_PASSWORD_HASH: ${{ secrets.VM_ADMIN_PASSWORD_HASH }}
          ZONE: ${{ inputs.zone }}
          APP_DOMAIN: ${{ inputs.app_domain }}
          ACME_EMAIL: ${{ inputs.acme_email }}
        run: python scripts/write_terraform_vars.py

      - name: Terraform init
        run: terraform -chdir="$TF_DIR" init

      - name: Terraform apply
        run: scripts/terraform_apply.sh "$TF_DIR"

      - name: Resolve SSH host
        id: resolve_ssh_host
        run: |
          host="$(python scripts/resolve_ssh_host.py)"
          echo "host=$host" >> "$GITHUB_OUTPUT"

      - name: Render Ansible inventory
        env:
          APP_HOST: ${{ steps.resolve_ssh_host.outputs.host }}
          SSH_USER_FALLBACK: macsia
          SSH_PORT_FALLBACK: "22"
          SSH_KEY_FILE: /home/runner/.ssh/debtsapp_vm
        run: ./scripts/render-ansible-inventory.sh "$TF_DIR" > infra/ansible/inventory.ini

      - name: Wait for SSH
        run: scripts/wait_for_ssh.sh "${{ steps.resolve_ssh_host.outputs.host }}"

      - name: Write deploy secrets file
        env:
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python scripts/write_deploy_secrets.py

      - name: Bootstrap k3s
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
        run: |
          ansible-playbook infra/ansible/bootstrap-k3s.yml \
            -i infra/ansible/inventory.ini \
            -e app_domain="${{ inputs.app_domain }}"

      - name: Deploy DebtsApp
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
        run: |
          ansible-playbook infra/ansible/deploy-app.yml \
            -i infra/ansible/inventory.ini \
            -e app_domain="${{ inputs.app_domain }}" \
            -e acme_email="${{ inputs.acme_email }}"
