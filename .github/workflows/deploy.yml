name: "Deploy: VM и приложение"

on:
  workflow_dispatch:
    inputs:
      app_domain:
        description: Публичный DNS для DebtsApp
        required: false
        default: debtsapp2.macsia.fun
        type: string
      acme_email:
        description: Email для HTTPS-сертификатов
        required: false
        default: macsia.production@gmail.com
        type: string
      vm_name:
        description: Имя VM в Yandex Cloud
        required: false
        default: debtsapp-docker
        type: string
      zone:
        description: Зона Yandex Cloud
        required: false
        default: ru-central1-a
        type: string

jobs:
  deploy:
    name: Развернуть VM и приложение
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_CLI_CONFIG_FILE: ${{ github.workspace }}/infra/terraform/terraformrc
      TF_DIR: infra/terraform/yandex
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      VM_NAME: ${{ inputs.vm_name }}
    steps:
      - name: Получить код репозитория
        uses: actions/checkout@v4

      - name: Разрешить запуск deploy-скриптов
        run: chmod +x scripts/*.sh scripts/*.py

      - name: Установить Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Установить Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить Ansible и rsync
        run: |
          # Ansible выполняет deploy, rsync синхронизирует репозиторий на VM.
          python -m pip install --upgrade pip ansible
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Записать SSH-ключ для VM
        run: |
          # Приватный ключ нужен Ansible для подключения к созданной VM.
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/debtsapp_vm
          chmod 600 ~/.ssh/debtsapp_vm

      - name: Подготовить переменные Terraform и Ansible
        uses: ./.github/actions/prepare-deploy
        with:
          cloud_id: ${{ secrets.YC_CLOUD_ID }}
          folder_id: ${{ secrets.YC_FOLDER_ID }}
          ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
          admin_password_hash: ${{ secrets.VM_ADMIN_PASSWORD_HASH }}
          vm_name: ${{ inputs.vm_name }}
          zone: ${{ inputs.zone }}
          app_domain: ${{ inputs.app_domain }}
          acme_email: ${{ inputs.acme_email }}
          postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          neo4j_password: ${{ secrets.NEO4J_PASSWORD }}
          jwt_secret: ${{ secrets.JWT_SECRET }}
          bot_token: ${{ secrets.BOT_TOKEN }}

      - name: Инициализировать Terraform
        run: terraform -chdir="$TF_DIR" init

      - name: Создать или обновить VM
        run: scripts/terraform_apply.sh "$TF_DIR"

      - name: Сформировать inventory для Ansible
        run: |
          # Берем адрес VM из Terraform output или Yandex Cloud API.
          python scripts/resolve_ssh_host.py > /tmp/host.json
          SSH_KEY_FILE="$HOME/.ssh/debtsapp_vm" \
            scripts/render-ansible-inventory.sh /tmp/host.json > infra/ansible/inventory.ini

      - name: Дождаться SSH на VM
        run: |
          host="$(python -c 'import json;print(json.load(open("/tmp/host.json"))["host"])')"
          scripts/wait_for_ssh.sh "$host"

      - name: Запустить Ansible deploy
        run: ansible-playbook infra/ansible/site.yml -i infra/ansible/inventory.ini
