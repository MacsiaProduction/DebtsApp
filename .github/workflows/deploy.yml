name: Provision And Deploy

on:
  workflow_dispatch:
    inputs:
      app_domain:
        description: Public DNS name for DebtsApp
        required: false
        default: debtsapp2.macsia.fun
        type: string
      acme_email:
        description: Contact email used for HTTPS certificates
        required: false
        default: macsia.production@gmail.com
        type: string
      vm_name:
        description: Name of the Yandex VM
        required: false
        default: debtsapp-docker
        type: string
      zone:
        description: Yandex Cloud zone
        required: false
        default: ru-central1-a
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TF_IN_AUTOMATION: "true"
      TF_CLI_CONFIG_FILE: ${{ github.workspace }}/infra/terraform/terraformrc
      TF_DIR: infra/terraform/yandex
      ANSIBLE_CONFIG: infra/ansible/ansible.cfg
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
      VM_NAME: ${{ inputs.vm_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/*.py

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible and rsync
        run: |
          python -m pip install --upgrade pip ansible
          sudo apt-get update
          sudo apt-get install -y rsync

      - name: Prepare SSH access
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/debtsapp_vm
          chmod 600 ~/.ssh/debtsapp_vm

      - name: Prepare deploy context
        uses: ./.github/actions/prepare-deploy
        with:
          cloud_id: ${{ secrets.YC_CLOUD_ID }}
          folder_id: ${{ secrets.YC_FOLDER_ID }}
          ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
          admin_password_hash: ${{ secrets.VM_ADMIN_PASSWORD_HASH }}
          vm_name: ${{ inputs.vm_name }}
          zone: ${{ inputs.zone }}
          app_domain: ${{ inputs.app_domain }}
          acme_email: ${{ inputs.acme_email }}
          postgres_password: ${{ secrets.POSTGRES_PASSWORD }}
          neo4j_password: ${{ secrets.NEO4J_PASSWORD }}
          jwt_secret: ${{ secrets.JWT_SECRET }}
          bot_token: ${{ secrets.BOT_TOKEN }}

      - name: Terraform init
        run: terraform -chdir="$TF_DIR" init

      - name: Terraform apply
        run: scripts/terraform_apply.sh "$TF_DIR"

      - name: Render Ansible inventory
        run: |
          python scripts/resolve_ssh_host.py > /tmp/host.json
          SSH_KEY_FILE="$HOME/.ssh/debtsapp_vm" \
            scripts/render-ansible-inventory.sh /tmp/host.json > infra/ansible/inventory.ini

      - name: Wait for SSH
        run: |
          host="$(python -c 'import json;print(json.load(open("/tmp/host.json"))["host"])')"
          scripts/wait_for_ssh.sh "$host"

      - name: Run site playbook
        run: ansible-playbook infra/ansible/site.yml -i infra/ansible/inventory.ini
